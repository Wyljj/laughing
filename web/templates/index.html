<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>环保咨询工作台</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <aside class="sidebar">
    <h2><i class="fa-solid fa-leaf"></i> 环保咨询工作台</h2>
    <ul>
      <li><i class="fa-regular fa-comments"></i> 对话工作台</li>
      <li><i class="fa-solid fa-book"></i> 标准/法规库</li>
      <li><i class="fa-regular fa-folder-open"></i> 项目资料库</li>
      <li><i class="fa-regular fa-file-lines"></i> 报告模板库</li>
      <li><i class="fa-solid fa-shield-halved"></i> 质控中心</li>
      <li><i class="fa-solid fa-box-archive"></i> 导出与证据包</li>
    </ul>
    <p class="tip">示例Token: <code>consultant-token</code></p>
  </aside>

  <main class="main-wrap">
    <header class="topbar card">
      <div class="title-wrap">
        <h1>项目咨询面板</h1>
        <p>引用可追溯 · 质控可审计 · 危废整改闭环</p>
      </div>
      <div class="meta-wrap">
        <span><i class="fa-regular fa-folder"></i> 当前项目: demo-project</span>
        <span><i class="fa-regular fa-user"></i> 当前用户: 咨询师</span>
        <button class="btn btn-ghost" type="button">退出</button>
      </div>
    </header>

    <section class="card hero-card">
      <h3>法规问答（主卡片）</h3>
      <div class="form-grid two-col">
        <input id="token" placeholder="token" value="consultant-token" />
        <input id="region" placeholder="地区，如新疆" value="新疆" />
        <input id="industry" placeholder="行业，如石油化工" value="石油化工" />
        <textarea id="question" rows="3" placeholder="请输入问题，例如：危废暂存间要求和依据是什么？"></textarea>
      </div>
      <div class="actions">
        <button id="askBtn" class="btn btn-primary" type="button" onclick="ask()">
          <span id="askSpinner" class="spinner hidden"></span>
          <span id="askText">发送问题</span>
        </button>
      </div>
      <pre id="answer" class="empty-state"><i class="fa-regular fa-lightbulb"></i> 请输入问题，系统将返回“结论 + 引用 + 风险提示”。</pre>
    </section>

    <section class="row-cards">
      <section class="card">
        <h3>危废合规差距分析</h3>
        <div class="actions"><button id="gapBtn" class="btn btn-primary" type="button" onclick="gap()">生成整改清单</button></div>
        <pre id="gap" class="empty-state"><i class="fa-solid fa-triangle-exclamation"></i> 暂无分析结果。点击上方按钮生成 7/30/90 天整改计划。</pre>
      </section>

      <section class="card">
        <h3>项目资料上传</h3>
        <div class="form-grid">
          <input id="project" placeholder="项目名" value="demo-project" />
          <input type="file" id="file" />
        </div>
        <div class="actions">
          <button id="uploadBtn" class="btn btn-primary" type="button" onclick="upload()">上传文件</button>
          <button class="btn btn-ghost" type="button">批量导出证据包</button>
        </div>
        <pre id="uploadResult" class="empty-state"><i class="fa-regular fa-file"></i> 暂无上传记录。</pre>
      </section>
    </section>
  </main>

<script src="/static/app.js"></script>
</body>
</html>
